qlib_init:
    provider_uri: "~/.qlib/qlib_data/cn_data"
    region: cn

task:
    model:
        class: LGBModel
        module_path: qlib.contrib.model.gbdt
        kwargs:
            loss: mse
            colsample_bytree: 0.8879
            learning_rate: 0.2
            subsample: 0.8789
            lambda_l1: 205.6999
            lambda_l2: 580.9768
            max_depth: 8
            num_leaves: 210
            num_threads: 4
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: DataHandlerLP
                module_path: qlib.data.dataset.handler
                kwargs:
                    start_time: "2008-01-01"
                    end_time: null
                    instruments: csi300
                    infer_processors:
                        - class: CSZScoreNorm
                          module_path: qlib.data.dataset.processor
                          kwargs:
                              fields_group: feature
                        - class: Fillna
                          module_path: qlib.data.dataset.processor
                          kwargs:
                              fields_group: feature
                    learn_processors:
                        - class: DropnaLabel
                          module_path: qlib.data.dataset.processor
                        - class: CSRankNorm
                          module_path: qlib.data.dataset.processor
                          kwargs:
                              fields_group: label
                    label:
                        - "Ref($close, -2)/Ref($close, -1) - 1"
                    data_loader:
                        class: QlibDataLoader
                        module_path: qlib.data.dataset.loader
                        kwargs:
                            config:
                                feature:
                                    - - "$close/Ref($close, 1) - 1"
                                      - "Std($close/Ref($close, 1)-1, 20)"
                                      - "$close/Ref($close, 5) - 1"
                                      - "$close/Ref($close, 10) - 1"
                                      - "$close/Ref($close, 20) - 1"
                                      - "($close/Ref($close, 5) - 1) / (Std($close/Ref($close, 1)-1, 20) + 1e-12)"
                                      - "Mean($close, 5)/$close - 1"
                                      - "Mean($close, 20)/$close - 1"
                                      - "($close - Mean($close, 20)) / (Std($close, 20) + 1e-12)"
                                      - "$volume / (Mean($volume, 20) + 1e-12)"
                                      - "Corr($close, Log($volume+1), 10)"
                                      - "Mean($volume, 5) / (Mean($volume, 20) + 1e-12)"
                                      - "($high - $low) / $open"
                                      - "($high - Greater($open, $close)) / ($high - $low + 1e-12)"
                                      - "Abs($close - $open) / ($high - $low + 1e-12)"
                                      - "Resi($close, 5) / $close"
                                      - "Resi($close, 10) / $close"
                                      - "Rsquare($close, 5)"
                                      - "Rsquare($close, 20)"
                                      - "Std(Abs($close/Ref($close,1)-1)*$volume, 5) / (Mean(Abs($close/Ref($close,1)-1)*$volume, 5) + 1e-12)"
                                      - "Corr($close/Ref($close,1), Log($volume/Ref($volume,1)+1), 5)"
                                      - "Ref($close, 60) / $close"
                                      - "Std($close, 5) / (Std($close, 20) + 1e-12)"
                                    - - "sova_ret_1d"
                                      - "sova_volatility_20d"
                                      - "sova_momentum_5d"
                                      - "sova_momentum_10d"
                                      - "sova_momentum_20d"
                                      - "sova_vol_adj_mom"
                                      - "sova_mean_rev_5"
                                      - "sova_mean_rev_20"
                                      - "sova_zscore_close"
                                      - "sova_vol_surge"
                                      - "sova_vol_price_corr"
                                      - "sova_vol_momentum"
                                      - "sova_klen"
                                      - "sova_upper_shadow"
                                      - "sova_body_ratio"
                                      - "sova_resi_5"
                                      - "sova_resi_10"
                                      - "sova_rsqr_5"
                                      - "sova_rsqr_20"
                                      - "sova_vol_weighted_ret"
                                      - "sova_cord_5"
                                      - "sova_roc_60"
                                      - "sova_std_ratio"
                                label:
                                    - - "Ref($close, -2)/Ref($close, -1) - 1"
                                    - - "LABEL0"
                            freq: day
            segments:
                train:
                    - "2008-01-01"
                    - "2014-12-31"
                valid:
                    - "2015-01-01"
                    - "2016-12-31"
                test:
                    - "2017-01-01"
                    - null
    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            ana_long_short: false
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            config:
                strategy:
                    class: TopkDropoutStrategy
                    module_path: qlib.contrib.strategy
                    kwargs:
                        signal: <PRED>
                        topk: 50
                        n_drop: 5
                backtest:
                    start_time: "2017-01-01"
                    end_time: null
                    account: 100000000
                    benchmark: SH000300
                    exchange_kwargs:
                        limit_threshold: 0.095
                        deal_price: close
                        open_cost: 0.0005
                        close_cost: 0.0015
                        min_cost: 5
